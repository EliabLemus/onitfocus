name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Build DMG
        run: chmod +x scripts/build-release.sh && ./scripts/build-release.sh ${{ github.ref_name }}

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload ${{ github.ref_name }} build/Focally-${{ github.ref_name }}.dmg --clobber

      - name: Update Homebrew Tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${{ github.ref_name }}"
          DMG_NAME="Focally-${VERSION}.dmg"
          DMG_SHA=$(shasum -a 256 build/${DMG_NAME} | cut -d' ' -f1)

          # Clone tap repo using gh CLI (handles auth properly)
          cd /tmp
          echo "$TAP_TOKEN" | gh auth login --with-token
          gh repo clone EliabLemus/homebrew-focally homebrew-focally
          cd homebrew-focally
          gh auth setup-git

          cat > Casks/focally.rb << EOF
          cask "focally" do
            version "${VERSION#v}"
            sha256 "${DMG_SHA}"

            url "https://github.com/EliabLemus/focally/releases/download/v#{version}/Focally-#{version}.dmg"
            name "Focally"
            desc "Minimal macOS menu bar focus timer with automatic DND and Slack status"
            homepage "https://github.com/EliabLemus/focally"

            app "Focally.app"

            zap trash: [
              "~/Library/Application Support/Focally",
              "~/Library/Preferences/app.focally.mac.plist",
            ]
          end
          EOF

          git add -A
          git commit -m "Update focally cask to ${VERSION}"
          git push
