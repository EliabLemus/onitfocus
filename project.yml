name: OnItFocus
options:
  bundleIdPrefix: com.openjaime
  xcodeVersion: "16.0"
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    PRODUCT_BUNDLE_IDENTIFIER: com.openjaime.onitfocus
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  OnItFocus:
    type: application
    platform: macOS
    sources:
      - OnItFocus
    settings:
      base:
        INFOPLIST_FILE: OnItFocus/Info.plist
        CODE_SIGN_ENTITLEMENTS: OnItFocus/OnItFocus.entitlements
        PRODUCT_BUNDLE_NAME: OnItFocus
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: true
        ENABLE_PREVIEWS: true
        SWIFT_EMIT_LOC_STRINGS: true
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: false
    entitlements:
      path: OnItFocus/OnItFocus.entitlements
    dependencies: []
