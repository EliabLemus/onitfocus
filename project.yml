name: Focally
options:
  bundleIdPrefix: app.focally
  xcodeVersion: "15.0"
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    PRODUCT_BUNDLE_IDENTIFIER: app.focally.mac
    MARKETING_VERSION: "0.4.2"
    CURRENT_PROJECT_VERSION: "5"

targets:
  Focally:
    type: application
    platform: macOS
    sources:
      - Focally
      - path: Focally/Resources
        type: folder
        buildPhase: resources
    settings:
      base:
        INFOPLIST_FILE: Focally/Info.plist
        CODE_SIGN_ENTITLEMENTS: Focally/Focally.entitlements
        PRODUCT_BUNDLE_NAME: Focally
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: true
        ENABLE_PREVIEWS: true
        SWIFT_EMIT_LOC_STRINGS: true
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: false
    entitlements:
      path: Focally/Focally.entitlements
      properties:
        com.apple.security.automation.apple-events: true
    dependencies: []
